# WestGame Error Codes
# Sources: document_english.json (doc_err_info) + service_key.h (ETshpErrCode)
# [SVC] prefix = from service_key.h (server-side enum, no client text in doc_err_info)
# Total: 1601 entries
#  1. 两个数据源互补：doc_err_info（1369条）是客户端显示文本，ETshpErrCode（838条）是服务端枚举。两者有大量重叠（606条共
#  有），最终合并为 1601 条唯一错误码
#  2. [SVC] 前缀标识来源：从 service_key.h 补充的 232 条用 [SVC] 前缀标注，便于区分——这些是服务端内部错误，在
#  doc_err_info 中没有对应的客户端友好文本
#  3. 错误码段落分区：枚举按模块分段（10000+ 客户端、20000+ 服务端业务、30000+ 服务器内部、32000-37000+
#  各子模块、50000-60000 需重载），理解这个分区有助于快速定位错误类别

