# AVA 战场建筑数据 (Steamworks Standoff)
# 来源: document_english.json -> doc_lvl_building, doc_lvl_building_info, doc_label, doc_tile
# 注意: 具体数值(首占得分、持续得分等)由服务器配置决定，此处仅记录文字描述的规则和效果

# ============================================================
# 得分规则 (doc_label.710012)
# ============================================================
# 1. 占领战场建筑 (First Occupation + Successive Occupation)
#    - First Occupation: 首次占领建筑的联盟获得首占积分，建筑内驻军成员获得个人积分
#    - Successive Occupation: 持续占领建筑，联盟按秒获得持续占领积分，驻军成员获得个人积分
# 2. 煤矿采集 (Coal Pit Gathering)
#    - 采集煤矿运回 Haven 获得联盟和个人积分
# 3. 战斗杀伤 (Battle Kills/Wounds)
#    - 攻击或防守时杀伤敌方部队获得个人积分

# ============================================================
# 建筑效果汇总 (doc_label.710031)
# ============================================================
# - Stable: 行军速度加成 + 缩短免费高级迁城冷却
# - Arsenal: 部队攻击+防御+生命加成
# - Boiler House: 所有建筑占领时间缩短
# - Mercenary Camp: 派遣佣兵削弱敌方占领建筑的攻防
# - Production Plant/Shed: 占领后产出煤矿
# - Coal Pit: 资源建筑，运煤回城得分，会消失并周期刷新
# - Steam Factory: 大量产出煤矿，持续占领引来中立攻击
# - Pony Station: 占领得分，失守掉落 Coal Cart

# ============================================================
# 建筑开放顺序 (doc_label.710046)
# ============================================================
# wave 1: Production Shed (Bunker) + Pony Station
# wave 2: Arsenal, Boiler House, Stable, Production Plant
# wave 3: Steam Factory (最后开放)

# ============================================================
# 战场医院 (doc_label.710031, 710246)
# ============================================================
# - 无容量上限
# - 治疗无资源消耗
# - 可用宝石秒治

