doc_soldier:
- id: 1
  title: Slugger
  name: T1 Slugger Basher
  desc: 'Basher Type: A former civilian wielding a simple baseball bat, aiming for
    home runs on zombie heads.'
  info: "<color=#299108>Strong against Piercer.</color>\r\n<color=#f01c2b>Weak against\
    \ Shooter.</color>"
- id: 2
  title: Brawler
  name: T2 Brawler Basher
  desc: 'Basher Type: Toughened by street fights, he uses an aluminum bat and improvised
    padding to survive.'
  info: "<color=#299108>Strong against Piercer.</color>\r\n<color=#f01c2b>Weak against\
    \ Shooter.</color>"
- id: 3
  title: 'Crusher '
  name: T3 Crusher  Basher
  desc: 'Basher Type: He modified his weapon with rusty nails to smash through the
    frozen skulls of the infected.'
  info: "<color=#299108>Strong against Piercer.</color>\r\n<color=#f01c2b>Weak against\
    \ Shooter.</color>"
- id: 4
  title: Riot Guard
  name: T4 Riot Guard Basher
  desc: 'Basher Type: Equipped with standard police gear to hold the line against
    chaotic waves of enemies.'
  info: "<color=#299108>Strong against Piercer.</color>\r\n<color=#f01c2b>Weak against\
    \ Shooter.</color>"
