# WestGame AI 团战系统 — 命令字最小集合
# 来源: gg后台接口协议.md，按需求规格说明书v2筛选
# 原则: 只保留团战副本必须的命令字，只携带必要参数

# ============================================================
# 一、行动指令 (L0 执行层 → 游戏服务器)
# ============================================================

commands:

  # --- 移城 ---
  move_city:
    cmd: "fixed_move_city_new"
    default_param:
      use_gem: 1
      item_id: 1
      tar_pos: 0             # int, 后台坐标格式
    description: "定点移城（花费宝石），瞬间传送主城到目标坐标，同时秒回所有在外部队"

  # --- 攻打玩家主城（不带英雄，简化版） ---
  attack_city:
    cmd: "dispatch_troop"
    default_param:
      target_type: 2
      march_type: 2
    description: "攻打玩家主城（不带英雄），适用于纯兵力压制场景"

  # --- 攻击玩家 ---
  attack_player:
    cmd: "dispatch_troop"
    default_param:
      march_type: 2           # 2=攻击
      target_type: 2          # 2=城市
      target_info: {}         # {"id": unique_id, "pos": "坐标"}
      march_info: {}          # {"soldier":{"兵种id":数量}, "hero":{"main":id,"vice":id}}
    description: "派城内部队攻击敌方玩家主城"

  # --- 攻击建筑（占领据点） ---
  attack_building:
    cmd: "dispatch_troop"
    default_param:
      march_type: 2           # 2=攻击
      target_type: 13         # 13=城寨（待确认：团战据点的target_type）
      target_info: {}         # {"id": unique_id, "pos": "坐标"}
      march_info: {}          # {"soldier":{...}, "hero":{...}}
    description: "派城内部队攻击据点/建筑以占领"

  # --- 驻防/增援建筑 ---
  reinforce_building:
    cmd: "dispatch_troop"
    default_param:
      march_type: 11          # 11=增援
      target_info: {}         # {"id": unique_id, "pos": "坐标"}
      march_info: {}          # {"soldier":{...}, "hero":{...}}
    description: "派城内部队增援/驻防联盟建筑（据点）"

  # --- 侦察 ---
  scout_player:
    cmd: "dispatch_scout"
    default_param:
      scout_queue_id: 8001
      tar_type: 5             # 5=侦查城市
      tar_pos: 0              # 目标坐标
      need_camp: 0
    description: "侦察目标玩家，即时返回兵力和兵种信息"

  # --- 发起集结 ---
  create_rally:
    cmd: "create_rally_war"
    default_param:
      march_type: 13          # 13=rally_attack（集结攻击）
      target_type: 2          # 目标类型（2=城市, 13=城寨，视目标而定）
      target_info: {}         # {"id": "2_{uid}_1"}
      tn_limit: 1             # 部队数量限制
      march_info: {}          # 队长的部队信息
      prepare_time: 300       # 集结准备时长，默认300秒(5分钟)
      recommand_troop: []     # 推荐兵种类型
      timestamp: "0"          # 微秒时间戳(字符串)，用于发送联盟邀请
    description: "队长发起集结，开始5分钟集结窗口期"

  # --- 加入集结 ---
  join_rally:
    cmd: "dispatch_troop"
    default_param:
      march_type: 12          # 12=join_rally（加入集结，非13）
      target_type: 107        # 107=rally对象类型（非2=城市）
      target_info: {}         # {"id": rally_unique_id, "pos": 编码坐标}
      march_info: {}          # 队员的部队信息
    description: "队员派部队加入已发起的集结"

  # --- 解散集结 (队长操作) ---
  rally_dismiss:
    cmd: "rally_dismiss"
    default_param:
      unique_id: ""           # rally 的 unique_id (107_xxx_1)
    description: "队长解散整个集结"

  # --- 召回增援部队 (队员操作) ---
  recall_reinforce:
    cmd: "recall_reinforce"
    default_param:
      unique_id: ""           # 本人部队的 unique_id (101_xxx_1)
    description: "撤回本人在集结/增援中的部队"

  # --- 召回行军中的部队（回城） ---
  recall_troop:
    cmd: "change_troop"
    default_param:
      march_type: 5           # 5=回城
      march_info: {}          # {"ids": [部队unique_id]}
    description: "让行军中/驻扎中的部队返回主城"

# ============================================================
# 二、感知查询 (数据感知层 → 游戏服务器)
# ============================================================

  # --- 获取玩家全量数据 ---
  get_all_player_data:
    cmd: "game_server_login_get"
    default_param:
      all: 1                  # 1=全量数据
    description: "获取game_server上该玩家的所有数据（坐标、部队、行军队列等）"

  # --- 获取玩家地图坐标 ---
  get_player_pos:
    cmd: "login_get"
    default_param:
      all: 0
      list:
        - "svr_lord_info_new"
    description: "获取玩家地图坐标（轻量查询）"

  # --- 获取玩家基础信息 ---
  get_player_info:
    cmd: "login_get"
    default_param:
      all: 0
      list:
        - "svr_player"
    description: "获取玩家基础信息（含联盟等）"

  # --- 获取联盟成员列表 ---
  get_al_members:
    cmd: "get_self_al_member"
    default_param: {}
    description: "获取联盟全部成员列表（需在header中传入正确的aid）"

  # --- 获取地图缩略信息 ---
  get_map_overview:
    cmd: "get_map_brief_obj"
    default_param:
      sid: 0                  # 服务器id
    description: "获取地图缩略信息（建筑归属、玩家位置等概览数据）"

  # --- 获取地图详细信息 ---
  get_map_detail:
    cmd: "game_svr_map_get"
    default_param:
      sid: 0                  # 服务器id
      bid_list: []            # 需要查询的bid列表
    description: "获取地图指定区块的详细信息"

  # --- 查询战报 ---
  get_battle_report:
    cmd: "get_city_battle_report"
    default_param:
      id: ""                  # 报告id
    description: "获取单次战斗的详细战报"

# ============================================================
# 三、GM 指令 (活动开始前的准备)
# ============================================================

  # --- 添加宝石 ---
  add_gem:
    cmd: "op_self_set_gem"
    default_param:
      gem_num: 116666
    description: "GM指令：为账号添加宝石（活动前准备用）"

  # --- 添加士兵 ---
  add_soldiers:
    cmd: "op_add_soldiers"
    default_param:
      soldier_id: 204
      soldier_num: 1000000
    description: "GM指令：为账号添加士兵（活动前准备用）"

  # --- 添加资源 ---
  add_resource:
    cmd: "op_self_add_clear_resource"
    default_param:
      op_type: 0
    description: "GM指令：为账号添加各类资源（活动前准备用）"

  # --- 复制账号数据 ---
  copy_player:
    cmd: "op_copy_player"
    required_param:
      src_uid: "数据源账号UID"
      src_sid: "数据源账号SID"
      tar_uid: "目标账号UID"
      tar_sid: "目标账号SID"
    default_param:
      ignores: []
    description: "GM指令：复制账号数据（从源账号复制到目标账号）"

  # --- 玩家改昵称 ---
  change_name:
    cmd: "player_name_change"
    required_param:
      name: "新昵称"
    default_param:
      type: 1
      key: 300
    description: "GM指令：修改玩家昵称"

# ============================================================
# 四、联盟操作
# ============================================================

  # --- 创建联盟 ---
  create_alliance:
    cmd: "al_create"
    required_param:
      name: "联盟名称（5-20个字符）"
      nick: "联盟简称（3-4个字符）"
    validate:
      name:
        min_len: 5
        max_len: 20
      nick:
        min_len: 3
        max_len: 4
    default_param:
      desc: "desc"
      lang: 0
      policy: 1
      avatar: 60609
    description: "创建联盟"

  # --- 加入联盟 ---
  join_alliance:
    cmd: "al_request_join"
    required_param:
      target_aid: "目标联盟ID"
    default_param: {}
    description: "申请加入联盟"

  # --- 离开联盟 ---
  al_leave:
    cmd: "al_leave"
    default_param: {}
    description: "离开当前联盟"

  # --- 一键帮助盟友 ---
  al_help_all:
    cmd: "al_help_all"
    default_param: {}
    description: "一键帮助所有盟友"

# ============================================================
# 五、AVA 战场操作 (GM)
# ============================================================

  # --- 创建 AVA 临时战场 ---
  create_ava_battle:
    cmd: "op_create_lvl_battle"
    required_param:
      1v1_id: "战场ID"
    default_param:
      event_id: "123456"
      camp:
        - aid: 1000022
          al_nick: "ava1"
          al_name: "ava1"
          al_flag: 2
          uid_list:
            - 1000138
            - 1001913
            - 1001914
            - 1001915
            - 1001916
            - 1001917
            - 1001918
            - 1001919
            - 1001920
            - 1001921
        - aid: 1000015
          al_nick: "ava2"
          al_name: "ava2"
          al_flag: 1
          uid_list:
            - 1000078
            - 1001922
            - 1001923
            - 1001924
            - 1001925
            - 1001926
            - 1001927
            - 1001928
    description: "GM指令：创建AVA临时战场（含双方阵营配置）"

  # --- 添加玩家到 AVA 战场 ---
  ava_add_player:
    cmd: "op_lvl_set_player"
    required_param:
      lvl_id: "战场ID"
      uid: "玩家UID"
      camp_id: "阵营ID（1或2）"
    validate:
      camp_id:
        min_val: 1
        max_val: 2
    default_param: {}
    description: "GM指令：将玩家添加到AVA临时战场名单"

  # --- 进入 AVA 战场 ---
  ava_enter_battle:
    cmd: "op_enter_lvl_battle"
    required_param:
      lvl_id: "战场ID"
    default_param: {}
    description: "进入AVA临时战场"
